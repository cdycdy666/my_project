<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Monitor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Agent Operations Console</div>
          <h1>Personal Agents Flight Recorder</h1>
        </div>
        <div class="top-actions">
          <span id="lastUpdated" class="muted">loading</span>
          <button id="refreshBtn" class="icon-button" type="button" title="刷新">↻</button>
        </div>
      </header>

      <main class="layout">
        <aside class="rail">
          <div class="section-title">Agents</div>
          <div id="agentList" class="agent-list"></div>
          <div class="section-title">Alerts</div>
          <div id="alertList" class="alert-list"></div>
        </aside>

        <section class="stage">
          <div id="metrics" class="metrics"></div>
          <div class="toolbar">
            <div class="toolbar-group">
              <div class="segmented" role="tablist" aria-label="视图">
                <button id="showRunsBtn" class="seg active" type="button">运行记录</button>
                <button id="showArchBtn" class="seg" type="button">架构视图</button>
              </div>
              <div class="segmented subtle" role="group" aria-label="时间范围">
                <button class="seg compact active" data-range="24h" type="button">24h</button>
                <button class="seg compact" data-range="7d" type="button">7d</button>
                <button class="seg compact" data-range="all" type="button">All</button>
              </div>
              <div class="segmented subtle" role="group" aria-label="状态筛选">
                <button class="seg compact active" data-status="all" type="button">全部</button>
                <button class="seg compact" data-status="warning" type="button">Warning</button>
                <button class="seg compact" data-status="failed" type="button">Failed</button>
              </div>
            </div>
            <div id="scopeLabel" class="scope-label"></div>
          </div>

          <div class="workspace">
            <section class="runs-panel">
              <div class="panel-heading">
                <div>
                  <div class="section-title">Run Timeline</div>
                  <p class="hint">trace、证据门、工具调用和普通服务日志会在这里汇合。</p>
                </div>
              </div>
              <div id="runList" class="run-list"></div>
            </section>

            <section class="detail-panel">
              <div id="detailHeader" class="detail-header"></div>
              <div id="flowView" class="flow-view"></div>
              <div id="eventInspector" class="event-inspector"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
