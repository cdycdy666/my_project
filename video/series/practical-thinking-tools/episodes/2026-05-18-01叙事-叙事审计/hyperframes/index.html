<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>叙事审计｜实用思维工具</title>

    <div id="thinking-tool-template" data-composition-id="thinking-tool-template" data-start="0" data-duration="246" data-width="1080" data-height="1920">
      <div class="canvas" data-layout-allow-overflow>
        <div class="paper-grain" data-layout-ignore></div>
        <div class="ledger-grid" data-layout-ignore></div>
        <div class="signal signal-a" data-layout-ignore></div>
        <div class="signal signal-b" data-layout-ignore></div>
        <div class="signal signal-c" data-layout-ignore></div>

        <div class="series-chrome">
          <span class="js-series-title"></span>
          <span class="js-episode-label"></span>
        </div>
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="theme-badge js-theme-badge"></div>

        <section class="scene scene-hero">
          <p class="eyebrow js-hero-eyebrow"></p>
          <h1 class="hero-title js-hero-headline"></h1>
          <div class="redline js-hero-strike"></div>
          <p class="hero-subline js-hero-subline"></p>
          <div class="audit-snapshot" data-layout-allow-overflow>
            <div class="window-bar">
              <span class="js-window-label"></span>
              <i></i>
            </div>
            <div class="metric-grid js-hero-metrics"></div>
            <div class="chart-panel" aria-hidden="true">
              <div class="chart-line line-a"></div>
              <div class="chart-line line-b"></div>
              <div class="chart-line line-c"></div>
              <span class="chart-dot dot-a"></span>
              <span class="chart-dot dot-b"></span>
            </div>
          </div>
        </section>

        <section class="scene scene-principle">
          <div class="principle-card">
            <p class="principle-number js-principle-number"></p>
            <p class="eyebrow js-principle-label"></p>
            <h2 class="principle-title js-principle-title"></h2>
            <p class="principle-copy js-principle-copy"></p>
            <div class="value-chain js-principle-links"></div>
            <div class="half-chain js-principle-footer"></div>
          </div>
        </section>

        <section class="scene scene-case">
          <p class="eyebrow js-case-kicker"></p>
          <h2 class="section-title js-case-title"></h2>
          <div class="case-board">
            <div class="case-column weak">
              <div class="column-top">
                <p class="column-label js-case-left-label"></p>
                <span class="column-meta js-case-left-meta"></span>
              </div>
              <div class="mock-panel story-mock" aria-hidden="true">
                <div class="mock-row">
                  <span class="js-old-story-label"></span>
                  <b class="js-old-story-value"></b>
                </div>
                <div class="mock-score js-old-story-score"></div>
                <div class="mock-bars"><i></i><i></i><i></i></div>
              </div>
              <div class="flow-list js-case-left-flow"></div>
            </div>
            <div class="case-column strong">
              <div class="column-top">
                <p class="column-label js-case-right-label"></p>
                <span class="column-meta js-case-right-meta"></span>
              </div>
              <div class="mock-panel audit-mock" aria-hidden="true">
                <div class="form-line wide"></div>
                <div class="form-line"></div>
                <div class="order-stamp js-audit-stamp"></div>
              </div>
              <div class="flow-list js-case-right-flow"></div>
            </div>
          </div>
          <p class="case-insight js-case-insight"></p>
        </section>

        <section class="scene scene-diagnosis">
          <p class="eyebrow js-diagnosis-kicker"></p>
          <h2 class="section-title js-diagnosis-title"></h2>
          <div class="diagnosis-stack js-diagnosis-cards"></div>
        </section>

        <section class="scene scene-action">
          <p class="eyebrow js-action-kicker"></p>
          <h2 class="section-title js-action-title"></h2>
          <ol class="action-list js-action-items"></ol>
          <p class="action-caption js-action-caption"></p>
        </section>

        <section class="scene scene-outro">
          <div class="memory-card">
            <p class="eyebrow js-outro-kicker"></p>
            <h2 class="memory-line js-outro-title"></h2>
          </div>
          <p class="footer-note js-outro-footer"></p>
        </section>

        <div class="caption-layer js-captions" data-layout-allow-overflow></div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        const data = window.THINKING_TOOL_VIDEO;
        const root = document.getElementById("thinking-tool-template");
        root.setAttribute("data-composition-id", data.meta.id);
        root.setAttribute("data-duration", String(data.meta.duration));

        const make = (tag, className, text) => {
          const node = document.createElement(tag);
          if (className) node.className = className;
          if (text) node.textContent = text;
          return node;
        };
        const mount = (selector, children) => {
          const target = document.querySelector(selector);
          target.innerHTML = "";
          children.forEach((child) => target.appendChild(child));
        };
        function renderLines(selector, values, hotIndex) {
          mount(selector, values.map((value, index) => make("span", index === hotIndex ? "hot" : "muted", value)));
        }
        function renderMetrics(selector, values) {
          mount(selector, values.map((item) => {
            const card = make("div", "metric-card");
            card.append(make("span", "metric-label", item.label), make("span", "metric-value", item.value));
            return card;
          }));
        }
        function renderChain(selector, values) {
          mount(selector, values.map((item) => {
            const card = make("article", "chain-card");
            card.append(make("span", "chain-label", item.label), make("h3", "", item.title), make("p", "", item.body));
            return card;
          }));
        }
        function renderFlow(selector, values) {
          mount(selector, values.map((value) => make("div", "flow-item", value)));
        }
        function renderDiagnosis(selector, values) {
          mount(selector, values.map((item) => {
            const card = make("article", "diagnosis-card");
            const content = make("div");
            content.append(make("h3", "", item.title), make("p", "", item.body));
            card.append(make("span", "diagnosis-index", item.index), content);
            return card;
          }));
        }
        function renderActions(selector, values) {
          mount(selector, values.map((value) => make("li", "", value)));
        }

        document.querySelector(".js-series-title").textContent = data.meta.seriesTitle || "PRACTICAL THINKING TOOLS";
        document.querySelector(".js-episode-label").textContent = data.meta.episodeLabel || data.meta.id;
        document.querySelector(".js-theme-badge").textContent = data.meta.themeBadge || "";
        document.querySelector(".js-window-label").textContent = data.hero.windowLabel || "case report";

        document.querySelector(".js-hero-eyebrow").textContent = data.hero.eyebrow;
        renderLines(".js-hero-headline", data.hero.headline, 1);
        document.querySelector(".js-hero-strike").textContent = data.hero.strike;
        document.querySelector(".js-hero-subline").textContent = data.hero.subline;
        renderMetrics(".js-hero-metrics", data.hero.metrics);

        document.querySelector(".js-principle-number").textContent = data.principle.number;
        document.querySelector(".js-principle-label").textContent = data.principle.label;
        renderLines(".js-principle-title", data.principle.title, 1);
        document.querySelector(".js-principle-copy").textContent = data.principle.copy;
        renderChain(".js-principle-links", data.principle.links);
        document.querySelector(".js-principle-footer").textContent = data.principle.footer || "";

        document.querySelector(".js-case-kicker").textContent = data.caseStudy.kicker;
        document.querySelector(".js-case-title").textContent = data.caseStudy.title;
        document.querySelector(".js-case-left-label").textContent = data.caseStudy.leftLabel;
        document.querySelector(".js-case-left-meta").textContent = data.caseStudy.leftMeta;
        document.querySelector(".js-case-right-label").textContent = data.caseStudy.rightLabel;
        document.querySelector(".js-case-right-meta").textContent = data.caseStudy.rightMeta;
        document.querySelector(".js-old-story-label").textContent = data.caseStudy.oldStoryBadge?.label || "";
        document.querySelector(".js-old-story-value").textContent = data.caseStudy.oldStoryBadge?.value || "";
        document.querySelector(".js-old-story-score").textContent = data.caseStudy.oldStoryBadge?.score || "";
        document.querySelector(".js-audit-stamp").textContent = data.caseStudy.auditStamp?.stamp || "";
        renderFlow(".js-case-left-flow", data.caseStudy.leftFlow);
        renderFlow(".js-case-right-flow", data.caseStudy.rightFlow);
        document.querySelector(".js-case-insight").textContent = data.caseStudy.insight;

        document.querySelector(".js-diagnosis-kicker").textContent = data.diagnosis.kicker;
        document.querySelector(".js-diagnosis-title").textContent = data.diagnosis.title;
        renderDiagnosis(".js-diagnosis-cards", data.diagnosis.cards);

        document.querySelector(".js-action-kicker").textContent = data.action.kicker;
        document.querySelector(".js-action-title").textContent = data.action.title;
        renderActions(".js-action-items", data.action.items);
        document.querySelector(".js-action-caption").textContent = data.action.caption;

        document.querySelector(".js-outro-kicker").textContent = data.outro.kicker;
        renderLines(".js-outro-title", [data.outro.line1, data.outro.line2, data.outro.line3], 2);
        document.querySelector(".js-outro-footer").textContent = data.outro.footer;

        const captionsRoot = document.querySelector(".js-captions");
        data.captions.forEach((caption, index) => {
          const group = document.createElement("div");
          const text = document.createElement("div");
          group.className = "caption-group";
          group.id = "caption-" + index;
          text.className = "caption-text";
          text.textContent = caption.text;
          group.appendChild(text);
          captionsRoot.appendChild(group);
        });

        window.__timelines = window.__timelines || {};
        const timeline = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const t = data.timing;

        gsap.set(".scene", { opacity: 0 });
        gsap.set(".eyebrow, .hero-title span, .redline, .hero-subline, .audit-snapshot, .section-title, .principle-card, .case-column, .case-insight, .action-caption, .memory-card, .footer-note", {
          y: 48,
          opacity: 0,
        });
        gsap.set(".metric-card, .chain-card, .flow-item, .diagnosis-card, .action-list li", {
          y: 34,
          opacity: 0,
        });
        gsap.set(".caption-group", { y: 12, opacity: 0 });

        timeline.fromTo(".signal-a", { x: -40, y: -20, scale: 0.9 }, { x: 96, y: 120, scale: 1.12, duration: data.meta.duration, ease: "none" }, 0);
        timeline.fromTo(".signal-b", { x: 30, y: 40, scale: 1.04 }, { x: -96, y: -120, scale: 0.92, duration: data.meta.duration, ease: "none" }, 0);
        timeline.fromTo(".signal-c", { x: 0, y: 0, scale: 0.96 }, { x: 40, y: -90, scale: 1.08, duration: data.meta.duration, ease: "none" }, 0);
        timeline.fromTo(".ledger-grid", { opacity: 0.16 }, { opacity: 0.28, duration: data.meta.duration, ease: "none" }, 0);
        timeline.to(".progress-fill", { scaleX: 1, duration: data.meta.duration, ease: "none" }, 0);

        timeline.set(".scene-hero", { opacity: 1 }, t.heroStart);
        timeline.to(".scene-hero .eyebrow", { y: 0, opacity: 1, duration: 0.7 }, t.heroStart + 0.2);
        timeline.to(".scene-hero .hero-title span", { y: 0, opacity: 1, duration: 0.85, stagger: 0.16 }, t.heroStart + 0.5);
        timeline.to(".scene-hero .redline", { y: 0, opacity: 1, duration: 0.7 }, t.heroStart + 1.25);
        timeline.to(".scene-hero .hero-subline", { y: 0, opacity: 1, duration: 0.7 }, t.heroStart + 1.85);
        timeline.to(".scene-hero .audit-snapshot", { y: 0, opacity: 1, duration: 0.85 }, t.heroStart + 2.4);
        timeline.to(".scene-hero .metric-card", { y: 0, opacity: 1, duration: 0.52, stagger: 0.12 }, t.heroStart + 2.85);
        timeline.to(".scene-hero", { opacity: 0, duration: 0.8 }, t.heroEnd - 0.8);

        timeline.set(".scene-principle", { opacity: 1 }, t.principleStart);
        timeline.to(".scene-principle .principle-card", { y: 0, opacity: 1, duration: 0.85 }, t.principleStart + 0.25);
        timeline.to(".scene-principle .chain-card", { y: 0, opacity: 1, duration: 0.6, stagger: 0.18 }, t.principleStart + 1.0);
        timeline.to(".scene-principle", { opacity: 0, duration: 0.75 }, t.principleEnd - 0.75);

        timeline.set(".scene-case", { opacity: 1 }, t.caseStart);
        timeline.to(".scene-case .eyebrow", { y: 0, opacity: 1, duration: 0.65 }, t.caseStart + 0.2);
        timeline.to(".scene-case .section-title", { y: 0, opacity: 1, duration: 0.78 }, t.caseStart + 0.45);
        timeline.to(".scene-case .case-column.weak", { y: 0, opacity: 1, duration: 0.82 }, t.caseStart + 1.05);
        timeline.to(".scene-case .case-column.weak .flow-item", { y: 0, opacity: 1, duration: 0.5, stagger: 0.12 }, t.caseStart + 1.65);
        timeline.to(".scene-case .case-column.strong", { y: 0, opacity: 1, duration: 0.82 }, t.caseRightReveal);
        timeline.to(".scene-case .case-column.strong .flow-item", { y: 0, opacity: 1, duration: 0.5, stagger: 0.12 }, t.caseRightReveal + 0.55);
        timeline.to(".scene-case .case-insight", { y: 0, opacity: 1, duration: 0.7 }, t.caseInsightReveal);
        timeline.to(".scene-case .case-column.weak", { opacity: 0.64, duration: 0.7, overwrite: "auto" }, t.caseInsightReveal + 0.1);
        timeline.to(".scene-case .case-column.strong", { scale: 1.015, duration: 0.9, ease: "sine.out" }, t.caseInsightReveal + 0.2);
        timeline.to(".scene-case", { opacity: 0, duration: 0.8 }, t.caseEnd - 0.8);

        timeline.set(".scene-diagnosis", { opacity: 1 }, t.diagnosisStart);
        timeline.to(".scene-diagnosis .eyebrow", { y: 0, opacity: 1, duration: 0.55 }, t.diagnosisStart + 0.1);
        timeline.to(".scene-diagnosis .section-title", { y: 0, opacity: 1, duration: 0.65 }, t.diagnosisStart + 0.25);
        timeline.to(".scene-diagnosis .diagnosis-card", { y: 0, opacity: 1, duration: 0.55, stagger: 0.13 }, t.diagnosisStart + 0.65);
        timeline.to(".scene-diagnosis .diagnosis-card:nth-child(2)", { scale: 1.02, duration: 0.6, ease: "sine.out" }, t.diagnosisStart + 2.8);
        timeline.to(".scene-diagnosis", { opacity: 0, duration: 0.55 }, t.diagnosisEnd - 0.55);

        timeline.set(".scene-action", { opacity: 1 }, t.actionStart);
        timeline.to(".scene-action .eyebrow", { y: 0, opacity: 1, duration: 0.55 }, t.actionStart + 0.1);
        timeline.to(".scene-action .section-title", { y: 0, opacity: 1, duration: 0.65 }, t.actionStart + 0.25);
        timeline.to(".scene-action .action-list li", { y: 0, opacity: 1, duration: 0.56, stagger: 0.16 }, t.actionStart + 0.7);
        timeline.to(".scene-action .action-caption", { y: 0, opacity: 1, duration: 0.62 }, t.actionStart + 1.85);
        timeline.to(".scene-action", { opacity: 0, duration: 0.55 }, t.actionEnd - 0.55);

        timeline.set(".scene-outro", { opacity: 1 }, t.outroStart);
        timeline.to(".scene-outro .memory-card", { y: 0, opacity: 1, duration: 0.7 }, t.outroStart + 0.1);
        timeline.to(".scene-outro .footer-note", { y: 0, opacity: 1, duration: 0.55 }, t.outroStart + 0.55);
        timeline.to(".scene-outro .memory-card", { scale: 1.018, duration: Math.max(1, t.outroEnd - t.outroStart - 0.9), ease: "sine.inOut" }, t.outroStart + 0.8);

        data.captions.forEach((caption, index) => {
          const selector = "#caption-" + index;
          timeline.set(selector, { opacity: 0, y: 12 }, Math.max(0, caption.start - 0.01));
          timeline.to(selector, { opacity: 1, y: 0, duration: 0.16, ease: "power2.out" }, caption.start);
          timeline.to(selector, { opacity: 0, y: -8, duration: 0.12, ease: "power2.in" }, Math.max(caption.start, caption.end - 0.12));
          timeline.set(selector, { opacity: 0, y: 12 }, caption.end);
        });

        window.__timelines[data.meta.id] = timeline;
      </script>
    </div>
  </body>
</html>
