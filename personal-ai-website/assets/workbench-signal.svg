<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Workbench Signal Map</title>
  <desc id="desc">An abstract map of learning paths and AI tool nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e9f1e5"/>
      <stop offset="0.52" stop-color="#f7f6ec"/>
      <stop offset="1" stop-color="#e7eff3"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#17211c" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#17211c" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="720" fill="url(#bg)"/>
  <rect width="960" height="720" fill="url(#grid)"/>
  <path d="M94 526 C220 414 250 264 398 260 C526 256 548 366 662 322 C764 282 789 172 884 134" fill="none" stroke="#245c47" stroke-width="8" stroke-linecap="round"/>
