    <rect x="644" y="184" width="112" height="8" rx="4" opacity=".26"/>
    <rect x="452" y="432" width="142" height="10" rx="5" opacity=".78"/>
    <rect x="452" y="460" width="188" height="8" rx="4" opacity=".32"/>
    <rect x="452" y="484" width="126" height="8" rx="4" opacity=".26"/>
